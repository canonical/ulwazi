[tox]
# Default test environment to run with the `tox` command
envlist = lint, packaging, docs, linkcheck
isolated_build = True
min_version = 4.0

# Default settings for all environments
[testenv]
# Pass environment variables from the host to the test environment
pass_env =
    HOME
# List of external commands that tox is allowed to run
allowlist_externals =
    npm
    make
deps =
    # Install the theme itself from the source tree.
    .
    # Read the documentation build dependencies.
    -r requirements.txt

[testenv:lint]
description = "Check code style and quality with ruff"
deps =
    ruff
commands =
    ruff check .
    ruff format --check .

[testenv:packaging]
description = "Check that the package builds and is valid"
deps =
    build
    twine
commands =
    # build the package
    python -m build
    # check the built package metadata
    twine check dist/*

[testenv:docs]
description = "Build the documentation with the Ulwazi theme"
commands =
    # Build the docs, treating warnings as errors (-W) to catch issues
    sphinx-build -b html -W --keep-going {posargs:docs docs/_build/html}

[testenv:linkcheck]
description = "Check for broken links in the documentation"
commands =
    # Run the link checker
    sphinx-build -b linkcheck {posargs:docs docs/_build/linkcheck}